<style>
:root{--bg:#fdf8f3;--card:#fffbf6;--text:#3d2c1e;--sub:#9b8574;--acc:#c06840;--acc-lt:#fae8de;--bdr:#e6d9cc;--sun:#c84a4a;--sat:#5a8ab8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding:0 12px 80px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 4px}
.hdr h1{font-size:19px;font-weight:700;color:var(--acc);letter-spacing:-0.02em}
.sync{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:6px}
.sdot{width:8px;height:8px;border-radius:50%;background:#ccc}
.sdot.ok{background:#16a34a}.sdot.err{background:#ef4444}
.dnav{display:flex;align-items:center;gap:8px;padding:6px 0}
.dnav .nb{padding:10px 14px;border:1px solid var(--bdr);background:var(--card);color:var(--sub);font-size:14px;border-radius:10px;cursor:pointer}
.dnav .ddt{flex:1;padding:12px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;text-align:center;font-size:17px;font-weight:700;display:flex;justify-content:center;align-items:center;gap:8px;cursor:pointer}
.dnav .ddt.tdy{border-color:var(--acc);color:var(--acc)}
.dnav .ddt .wd{font-size:13px;font-weight:500;color:var(--sub)}
.dnav .ddt .wd.su{color:var(--sun)}
.dnav .ddt .wd.sa{color:var(--sat)}
.cal{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-top:8px;display:none}
.cal.on{display:block}
.cal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-h button{padding:6px 14px;border:1px solid var(--bdr);background:transparent;font-size:13px;color:var(--sub);border-radius:8px;cursor:pointer}
.cal-h .mt{font-size:14px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:12px}
.cal-grid .wd{text-align:center;color:var(--sub);padding:4px 0;font-weight:600;font-size:10px}
.cal-grid .dc{padding:8px 0;text-align:center;border-radius:6px;position:relative;cursor:pointer;font-weight:500}
.cal-grid .dc.tdy{background:var(--acc);color:#fff;font-weight:700}
.cal-grid .dc.cur:not(.tdy){background:var(--acc-lt)}
.cal-grid .dc.dim{color:#ddd}
.cal-grid .dc.has::after{content:"";position:absolute;bottom:3px;left:50%;width:4px;height:4px;background:var(--acc);border-radius:50%;transform:translateX(-50%)}
.cal-grid .dc.tdy.has::after{background:#fff}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;box-shadow:0 2px 8px rgba(120,80,40,.08);margin-top:12px;overflow:hidden}
.card-h{padding:13px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.card-h h2{font-size:15px;color:var(--acc);font-weight:700}
.card-h .cnt{font-size:12px;color:var(--sub);font-weight:600}
.tk-r{display:flex;align-items:center;gap:11px;padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.04);min-height:54px}
.tk-r:last-child{border-bottom:none}
.tk-c{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bdr);border-radius:5px;cursor:pointer;background:transparent;transition:all .15s}
.tk-c.on{background:var(--acc-lt);border-color:var(--acc)}
.tk-c.on::after{content:"";width:6px;height:11px;border:solid var(--acc);border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-bottom:3px}
.tk-cn{flex:1;min-width:0}
.tk-cn .tk-tx{font-size:14px;color:var(--text);line-height:1.4;word-wrap:break-word;white-space:pre-wrap}
.tk-cn canvas{display:block;width:auto;max-width:100%;max-height:48px;height:auto;background:#fdfaf6;border-radius:4px;image-rendering:-webkit-optimize-contrast;image-rendering:high-quality}
.tk-add{padding:13px;text-align:center;font-size:13px;color:var(--sub);background:var(--bg);border:none;width:100%;cursor:pointer;font-family:inherit}
.tk-add:active{background:var(--acc-lt);color:var(--acc)}
.tr-cat{padding:0;border-bottom:1px solid var(--bdr)}
.tr-cat:last-child{border-bottom:none}
.tr-cat-h{padding:9px 14px;background:var(--acc-lt);font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.tr-cat-h .tk-c{width:20px;height:20px}
.tr-lbl{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:3px}
.tr-edit{cursor:pointer;-webkit-user-select:none;user-select:none;border-radius:6px;padding:4px 6px;margin:-4px -6px}
.tr-edit:active{background:rgba(192,104,64,.08)}
.tr-txt{font-size:13px;color:var(--text);margin-top:3px;line-height:1.4;word-wrap:break-word;white-space:pre-wrap}
.tr-add-hint{font-size:11px;color:var(--sub);font-style:italic;opacity:0.55}
.tk-edit{cursor:pointer;border-radius:6px}
.tk-edit:active{background:rgba(192,104,64,.06)}
.tr-media{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tr-media-item{position:relative;width:60px;height:60px;border-radius:6px;overflow:hidden;background:#000;flex-shrink:0;cursor:pointer}
.tr-media-item img,.tr-media-item video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.tr-media-item .del{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.75);color:#fff;border:none;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:2}
.tr-media-item .play-icon{position:absolute;top:50%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);width:24px;height:24px;background:rgba(0,0,0,.6);border-radius:50%;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;pointer-events:none}
.media-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1.5px dashed var(--bdr);border-radius:8px;color:var(--sub);font-size:13px;margin-top:10px;cursor:pointer;background:transparent}
.media-add-btn:active{background:var(--acc-lt);color:var(--acc);border-color:var(--acc)}
.media-add-btn input{display:none}
.tr-media-edit{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.media-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:3000;cursor:pointer}
.media-viewer img,.media-viewer video{max-width:100%;max-height:100%;object-fit:contain}
.media-viewer .close-mv{position:absolute;top:env(safe-area-inset-top,12px);right:12px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.empty{padding:30px 16px;text-align:center;color:var(--sub);font-size:13px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;z-index:1000}
.modal.on{display:flex}
.modal-c{background:var(--card);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom))}
.modal-c h3{font-size:16px;margin-bottom:12px;color:var(--text);font-weight:700}
.modal-c textarea{width:100%;min-height:80px;padding:11px;border:1px solid var(--bdr);border-radius:8px;font-size:15px;font-family:inherit;resize:none;outline:none;background:var(--bg)}
.modal-c textarea:focus{border-color:var(--acc)}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-btns .cancel{background:transparent;border:1px solid var(--bdr);color:var(--sub)}
.modal-btns .ok{background:var(--acc);color:#fff}
.tst{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:2000}

<script>
var DB_NAME="RenyouNikki",DB_VER=1,STORE="entries";
var _idb=null,_idbOk=null,_mem={};
function _memLoad(){try{var d=localStorage.getItem("rn_data");if(d)_mem=JSON.parse(d)}catch(e){}}
function _memSave(){try{localStorage.setItem("rn_data",JSON.stringify(_mem))}catch(e){}}
function odb(){
  if(_idbOk===false)return Promise.resolve(null);
  if(_idb)return Promise.resolve(_idb);
  return new Promise(function(ok){
    try{
      var r=indexedDB.open(DB_NAME,DB_VER);
      r.onupgradeneeded=function(e){
        var d=e.target.result;
        if(!d.objectStoreNames.contains(STORE)){
          var s=d.createObjectStore(STORE,{keyPath:"id"});
          s.createIndex("date","date",{unique:false});
          s.createIndex("monthDay","monthDay",{unique:false});
          s.createIndex("yearMonth","yearMonth",{unique:false});
        }
      };
      r.onsuccess=function(e){_idb=e.target.result;_idbOk=true;ok(_idb)};
      r.onerror=function(){_idbOk=false;_memLoad();ok(null)};
    }catch(e){_idbOk=false;_memLoad();ok(null)}
  });
}
function dbPut(entry){
  return odb().then(function(db){
    if(!db){_mem[entry.id]=entry;_memSave();return}
    return new Promise(function(ok,no){
      var tx=db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).put(entry);
      tx.oncomplete=function(){ok()};
      tx.onerror=function(){no()};
    });
  }).catch(function(){_mem[entry.id]=entry;_memSave()});
}
function dbGet(id){
  return odb().then(function(db){
    if(!db)return _mem[id]||null;
    return new Promise(function(ok){
      var tx=db.transaction(STORE,"readonly");
      var r=tx.objectStore(STORE).get(id);
      r.onsuccess=function(){ok(r.result||null)};
      r.onerror=function(){ok(_mem[id]||null)};
    });
  }).catch(function(){return _mem[id]||null});
}
function dbAll(){
  return odb().then(function(db){
    if(!db){var a=[];for(var k in _mem)a.push(_mem[k]);return a}
    return new Promise(function(ok){
      var tx=db.transaction(STORE,"readonly");
      var r=tx.objectStore(STORE).getAll();
      r.onsuccess=function(){ok(r.result||[])};
      r.onerror=function(){var a=[];for(var k in _mem)a.push(_mem[k]);ok(a)};
    });
  }).catch(function(){var a=[];for(var k in _mem)a.push(_mem[k]);return a});
}

function fmt(d){return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate())}
function gmd(d){return p2(d.getMonth()+1)+"-"+p2(d.getDate())}
function p2(n){return n<10?"0"+n:""+n}
var WD=["日","月","火","水","木","金","土"];
var WDC=["su","wd","wd","wd","wd","wd","sa"];

function _findBbox(d,w,h){
  var minX=w,minY=h,maxX=-1,maxY=-1,x,y;
  for(y=0;y<h;y++){for(x=0;x<w;x++){if(d[(y*w+x)*4+3]>0){minY=y;break}}if(minY<h)break}
  if(minY===h)return null;
  for(y=h-1;y>=minY;y--){for(x=0;x<w;x++){if(d[(y*w+x)*4+3]>0){maxY=y;break}}if(maxY>=0)break}
  for(x=0;x<w;x++){for(y=minY;y<=maxY;y++){if(d[(y*w+x)*4+3]>0){minX=x;break}}if(minX<w)break}
  for(x=w-1;x>=minX;x--){for(y=minY;y<=maxY;y++){if(d[(y*w+x)*4+3]>0){maxX=x;break}}if(maxX>=0)break}
  return{x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1};
}
function renderCropped(canvas,dataUrl){
  if(!dataUrl){canvas.style.display="none";return}
  var img=new Image();
  img.onload=function(){
    var t=document.createElement("canvas");
    t.width=img.naturalWidth;t.height=img.naturalHeight;
    var tc=t.getContext("2d");tc.drawImage(img,0,0);
    var data;
    try{data=tc.getImageData(0,0,t.width,t.height)}catch(e){
      canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;
      canvas.getContext("2d").drawImage(img,0,0);return;
    }
    var bbox=_findBbox(data.data,data.width,data.height);
    if(!bbox){canvas.style.display="none";return}
    var pad=Math.max(8,Math.round(Math.min(t.width,t.height)*0.02));
    var bx=Math.max(0,bbox.x-pad),by=Math.max(0,bbox.y-pad);
    var bw=Math.min(t.width,bbox.x+bbox.w+pad)-bx;
    var bh=Math.min(t.height,bbox.y+bbox.h+pad)-by;
    canvas.width=bw;canvas.height=bh;
    var cc=canvas.getContext("2d");
    cc.imageSmoothingEnabled=false;
    cc.drawImage(img,bx,by,bw,bh,0,0,bw,bh);
  };
  img.onerror=function(){canvas.style.display="none"};
  img.src=dataUrl;
}

var SYNC_URL="";
try{SYNC_URL=localStorage.getItem("rn_sync_url")||""}catch(e){}
var _fbApp,_fbDb,_fbRef,_fbStorage=null,_fbReady=false,_skipRemoteIds={};

function _deriveStorageBucket(dbUrl){
  if(!dbUrl)return null;
  var host=dbUrl.replace(/^https?:\/\//,"").split("/")[0];
  var first=host.split(".")[0];
  first=first.replace(/-default-rtdb$/,"");
  return first?first+".appspot.com":null;
}

function setSync(s,t){
  var dot=document.getElementById("sdot");
  var stat=document.getElementById("stat");
  if(!dot||!stat)return;
  dot.className="sdot "+(s||"off");
  stat.textContent=t||"";
}

function loadFirebaseSDK(cb){
  if(typeof firebase!=="undefined"&&firebase.database&&firebase.storage){cb(true);return}
  var s1=document.createElement("script");
  s1.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";
  s1.onload=function(){
    var s2=document.createElement("script");
    s2.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";
    s2.onload=function(){
      var s3=document.createElement("script");
      s3.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js";
      s3.onload=function(){cb(true)};
      s3.onerror=function(){cb(true)};
      document.head.appendChild(s3);
    };
    s2.onerror=function(){cb(false)};
    document.head.appendChild(s2);
  };
  s1.onerror=function(){cb(false)};
  document.head.appendChild(s1);
}

function initFirebase(){
  if(!SYNC_URL){
    setSync("off","同期未設定");
    document.getElementById("setup").classList.add("on");
    return;
  }
  loadFirebaseSDK(function(ok){
    if(!ok){setSync("err","SDK読込失敗");return}
    try{
      var cfg={databaseURL:SYNC_URL};
      var bucket=_deriveStorageBucket(SYNC_URL);
      if(bucket)cfg.storageBucket=bucket;
      _fbApp=firebase.initializeApp(cfg);
      _fbDb=firebase.database();
      _fbRef=_fbDb.ref("diary");
      try{if(firebase.storage)_fbStorage=firebase.storage()}catch(stErr){_fbStorage=null}
      _fbReady=true;
      _fbDb.ref(".info/connected").on("value",function(snap){
        if(snap.val()===true){setSync("ok","同期中");doFullSync()}
        else setSync("off","オフライン");
      });
      _fbRef.on("child_changed",function(snap){
        var rid=snap.key,r=snap.val();
        if(_skipRemoteIds[rid]){delete _skipRemoteIds[rid];return}
        if(!r)return;r.id=rid;
        dbGet(rid).then(function(local){
          if(!local||!local.updatedAt||r.updatedAt>local.updatedAt){
            dbPut(r).then(function(){if(fmt(sel)===rid)render();markCalNeedsRefresh()});
          }
        });
      });
      _fbRef.on("child_added",function(snap){
        var rid=snap.key,r=snap.val();
        if(_skipRemoteIds[rid]){delete _skipRemoteIds[rid];return}
        if(!r)return;r.id=rid;
        dbGet(rid).then(function(local){
          if(!local){dbPut(r).then(function(){markCalNeedsRefresh()})}
        });
      });
    }catch(e){setSync("err","初期化エラー")}
  });
}

function doFullSync(){
  if(!_fbReady||!_fbRef)return;
  dbAll().then(function(local){
    _fbRef.once("value",function(snap){
      var remote=snap.val()||{},lmap={};
      for(var i=0;i<local.length;i++)lmap[local[i].id]=local[i];
      var toUp={},toSave=[],id;
      for(id in lmap){
        var le=lmap[id],re=remote[id];
        if(!re||!re.updatedAt||(le.updatedAt&&le.updatedAt>re.updatedAt))toUp[id]=le;
        else if(re.updatedAt&&(!le.updatedAt||re.updatedAt>le.updatedAt)){re.id=id;toSave.push(re)}
      }
      for(id in remote){if(!lmap[id]){remote[id].id=id;toSave.push(remote[id])}}
      var up=Promise.resolve();
      var upKeys=[];for(var k in toUp)upKeys.push(k);
      if(upKeys.length>0){up=new Promise(function(o){_fbRef.update(toUp,function(){o()})})}
      up.then(function(){
        var c=Promise.resolve();
        for(var j=0;j<toSave.length;j++){(function(e){c=c.then(function(){return dbPut(e)})})(toSave[j])}
        c.then(function(){render();refreshCalDays()});
      });
    });
  });
}

function pushToFirebase(entry){
  if(!_fbReady||!_fbRef)return;
  try{_skipRemoteIds[entry.id]=true;_fbRef.child(entry.id).set(entry)}catch(e){}
}

var sel=new Date();
sel.setHours(0,0,0,0);
var calMonth=new Date(sel);calMonth.setDate(1);
var calDays={};
var _calRefreshScheduled=false;

function toast(m){
  var t=document.getElementById("tst");
  t.textContent=m;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},1800);
}

function updateDateDisplay(){
  var ddt=document.getElementById("ddt");
  var w=sel.getDay();
  var today=new Date();today.setHours(0,0,0,0);
  var isTdy=fmt(sel)===fmt(today);
  ddt.className=isTdy?"ddt tdy":"ddt";
  ddt.innerHTML=sel.getFullYear()+"年"+(sel.getMonth()+1)+"月"+sel.getDate()+'日 <span class="wd '+WDC[w]+'">('+WD[w]+')</span>';
}

function navDay(d){
  sel=new Date(sel.getTime()+d*86400000);
  sel.setHours(0,0,0,0);
  updateDateDisplay();
  render();
}

function renderCal(){
  var grid=document.getElementById("cgrid");
  var mt=document.getElementById("cmt");
  var y=calMonth.getFullYear(),m=calMonth.getMonth();
  mt.textContent=y+"年"+(m+1)+"月";
  var first=new Date(y,m,1);
  var lastDay=new Date(y,m+1,0).getDate();
  var startWd=first.getDay();
  var today=new Date();today.setHours(0,0,0,0);
  var prevLast=new Date(y,m,0).getDate();
  var h="";
  for(var i=0;i<7;i++)h+='<div class="wd">'+WD[i]+'</div>';
  for(var p=0;p<startWd;p++){
    var dn=prevLast-startWd+p+1;
    h+='<div class="dc dim">'+dn+'</div>';
  }
  for(var d=1;d<=lastDay;d++){
    var dt=new Date(y,m,d);
    var ds=fmt(dt);
    var cls="dc";
    if(fmt(today)===ds)cls+=" tdy";
    if(fmt(sel)===ds)cls+=" cur";
    if(calDays[ds])cls+=" has";
    h+='<div class="'+cls+'" data-d="'+ds+'">'+d+'</div>';
  }
  grid.innerHTML=h;
  var cells=grid.querySelectorAll(".dc[data-d]");
  for(var i2=0;i2<cells.length;i2++){
    cells[i2].addEventListener("click",function(){
      var ds=this.getAttribute("data-d");
      var parts=ds.split("-");
      sel=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
      sel.setHours(0,0,0,0);
      updateDateDisplay();
      render();
      document.getElementById("cal").classList.remove("on");
    });
  }
}

function refreshCalDays(){
  dbAll().then(function(a){
    calDays={};
    var ym=fmt(calMonth).substring(0,7);
    for(var i=0;i<a.length;i++){
      var e=a[i];
      if(!e.id||e.id.substring(0,7)!==ym)continue;
      var has=false;
      if(e.tasks){
        for(var t=0;t<e.tasks.length;t++){
          if(e.tasks[t].done||e.tasks[t].drawing||e.tasks[t].text){has=true;break}
        }
      }
      if(!has&&e.training){
        for(var k in e.training){
          if(e.training[k].done||e.training[k].drawing){has=true;break}
        }
      }
      if(has)calDays[e.id]=true;
    }
    renderCal();
  });
}

function markCalNeedsRefresh(){
  if(_calRefreshScheduled)return;
  _calRefreshScheduled=true;
  setTimeout(function(){_calRefreshScheduled=false;refreshCalDays()},300);
}

function render(){
  var ds=fmt(sel);
  dbGet(ds).then(function(entry){
    entry=entry||{};
    renderTasks(entry);
    renderTraining(entry);
  });
}

function escapeHtml(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

function renderTasks(entry){
  var list=document.getElementById("taskList");
  var cnt=document.getElementById("taskCnt");
  var tasks=entry.tasks||[];
  var doneCnt=0;
  for(var i=0;i<tasks.length;i++){if(tasks[i].done)doneCnt++}
  cnt.textContent=tasks.length>0?doneCnt+"/"+tasks.length:"";
  if(tasks.length===0){
    list.innerHTML='<div class="empty">この日のタスクはまだありません</div>';
    return;
  }
  var h="";
  for(var i=0;i<tasks.length;i++){
    var t=tasks[i];
    h+='<div class="tk-r">';
    h+='<div class="tk-c'+(t.done?" on":"")+'" data-i="'+i+'"></div>';
    var editable=!!t.text||(!t.drawing);
    h+='<div class="tk-cn '+(editable?"tk-edit":"")+'" data-edit-i="'+i+'">';
    if(t.text)h+='<div class="tk-tx">'+escapeHtml(t.text)+'</div>';
    if(t.drawing)h+='<canvas data-src="'+t.drawing+'"></canvas>';
    if(!t.text&&!t.drawing)h+='<div class="tk-tx" style="color:var(--sub)">タップして内容を追加</div>';
    h+='</div></div>';
  }
  list.innerHTML=h;
  var cvs=list.querySelectorAll("canvas[data-src]");
  for(var c=0;c<cvs.length;c++)renderCropped(cvs[c],cvs[c].getAttribute("data-src"));
  var chks=list.querySelectorAll(".tk-c[data-i]");
  for(var k=0;k<chks.length;k++){
    chks[k].addEventListener("click",function(e){
      e.stopPropagation();
      var idx=parseInt(this.getAttribute("data-i"));
      toggleTask(idx);
    });
  }
  /* Tap on text/empty area opens edit modal (handwriting tasks not editable from mobile) */
  var edits=list.querySelectorAll(".tk-edit");
  for(var ee=0;ee<edits.length;ee++){
    edits[ee].addEventListener("click",function(){
      var idx=parseInt(this.getAttribute("data-edit-i"));
      openTaskEdit(idx);
    });
  }
}

function renderTraining(entry){
  var list=document.getElementById("trList");
  var cnt=document.getElementById("trCnt");
  var t=entry.training||{};
  var trItems=[
    {cat:"筋トレ",rows:[
      {id:"muscle_legs",label:"脚",hasOwn:true},
      {id:"muscle_chest",label:"胸",hasOwn:true},
      {id:"muscle_shoulder",label:"肩",hasOwn:true},
      {id:"muscle_back",label:"背中",hasOwn:true},
      {id:"muscle_arms",label:"腕",hasOwn:true}
    ]},
    {cat:"ランニング",parent:"running",rows:[
      {id:"running_distance",label:"距離"},
      {id:"running_time",label:"時間"},
      {id:"running_pace",label:"ペース"}
    ]},
    {cat:"クロスフィット",parent:"crossfit",rows:[
      {id:"crossfit_menu",label:"メニュー"}
    ]},
    {cat:"その他",parent:"other",rows:[
      {id:"other_content",label:""}
    ]}
  ];
  var doneCount=0,totalCount=0;
  var bp=["muscle_legs","muscle_chest","muscle_shoulder","muscle_back","muscle_arms"];
  for(var b=0;b<bp.length;b++){
    if(t[bp[b]]&&t[bp[b]].done)doneCount++;
    if(t[bp[b]]&&(t[bp[b]].done||t[bp[b]].drawing))totalCount++;
  }
  var pcs=["running","crossfit","other"];
  for(var p2i=0;p2i<pcs.length;p2i++){
    if(t[pcs[p2i]]&&t[pcs[p2i]].done)doneCount++;
    if(t[pcs[p2i]]&&(t[pcs[p2i]].done||t[pcs[p2i]].drawing))totalCount++;
  }
  cnt.textContent=totalCount>0?doneCount+"/"+totalCount:"";
  var h="";
  for(var ci=0;ci<trItems.length;ci++){
    var item=trItems[ci];
    h+='<div class="tr-cat">';
    h+='<div class="tr-cat-h">';
    if(item.parent){
      var pdone=t[item.parent]&&t[item.parent].done?" on":"";
      h+='<div class="tk-c'+pdone+'" data-tr="'+item.parent+'"></div>';
    }
    h+='<span>'+item.cat+'</span>';
    h+='</div>';
    for(var ri=0;ri<item.rows.length;ri++){
      var row=item.rows[ri];
      var data=t[row.id]||{};
      h+='<div class="tk-r">';
      if(row.hasOwn){
        var rdone=data.done?" on":"";
        h+='<div class="tk-c'+rdone+'" data-tr="'+row.id+'"></div>';
      }else{
        h+='<div style="width:24px;flex-shrink:0"></div>';
      }
      var editLabel=row.label||item.cat;
      var mediaArr=data.media||[];
      h+='<div class="tk-cn tr-edit" data-tr-edit="'+row.id+'" data-tr-label="'+escapeHtml(editLabel)+'">';
      if(row.label)h+='<div class="tr-lbl">'+row.label+'</div>';
      if(data.drawing)h+='<canvas data-src="'+data.drawing+'"></canvas>';
      if(data.text)h+='<div class="tr-txt">'+escapeHtml(data.text)+'</div>';
      if(mediaArr.length>0){
        h+='<div class="tr-media">';
        for(var mi=0;mi<mediaArr.length;mi++){
          var mm=mediaArr[mi];
          var mmSrc=mm.url||mm.data||"";
          h+='<div class="tr-media-item" data-view-tr="'+row.id+'" data-view-mi="'+mi+'">';
          if(mm.type==="image")h+='<img src="'+mmSrc+'">';
          else h+='<video src="'+mmSrc+'" preload="metadata"></video><div class="play-icon">▶</div>';
          h+='</div>';
        }
        h+='</div>';
      }
      if(!data.drawing&&!data.text&&mediaArr.length===0)h+='<div class="tr-add-hint">タップしてメモや写真を追加</div>';
      h+='</div></div>';
    }
    h+='</div>';
  }
  list.innerHTML=h;
  var cvs=list.querySelectorAll("canvas[data-src]");
  for(var c=0;c<cvs.length;c++)renderCropped(cvs[c],cvs[c].getAttribute("data-src"));
  var chks=list.querySelectorAll(".tk-c[data-tr]");
  for(var k=0;k<chks.length;k++){
    chks[k].addEventListener("click",function(e){
      e.stopPropagation();
      var id=this.getAttribute("data-tr");
      toggleTraining(id);
    });
  }
  /* Tap on the content area opens the text editor for that training row */
  var edits=list.querySelectorAll(".tr-edit");
  for(var ee=0;ee<edits.length;ee++){
    edits[ee].addEventListener("click",function(){
      var id=this.getAttribute("data-tr-edit");
      var lbl=this.getAttribute("data-tr-label")||"";
      openTrEdit(id,lbl);
    });
  }
  /* Media thumbnails: quick view (don't open edit modal) */
  var mvs=list.querySelectorAll(".tr-media-item[data-view-tr]");
  for(var mv=0;mv<mvs.length;mv++){
    mvs[mv].addEventListener("click",function(e){
      e.stopPropagation();
      var trId=this.getAttribute("data-view-tr");
      var mi=parseInt(this.getAttribute("data-view-mi"));
      ensureEntry().then(function(entry){
        var m=((entry.training||{})[trId]||{}).media||[];
        if(m[mi])openMediaViewer(m[mi]);
      });
    });
  }
}

function ensureEntry(){
  var ds=fmt(sel);
  return dbGet(ds).then(function(e){
    return e||{id:ds,date:ds,monthDay:gmd(sel),yearMonth:ds.substring(0,7),_v:2};
  });
}

function toggleTask(idx){
  ensureEntry().then(function(entry){
    if(!entry.tasks)entry.tasks=[];
    if(!entry.tasks[idx])return;
    entry.tasks[idx].done=!entry.tasks[idx].done;
    entry.updatedAt=new Date().toISOString();
    dbPut(entry).then(function(){
      pushToFirebase(entry);
      render();
      markCalNeedsRefresh();
    });
  });
}

function toggleTraining(id){
  ensureEntry().then(function(entry){
    if(!entry.training)entry.training={};
    if(!entry.training[id])entry.training[id]={};
    entry.training[id].done=!entry.training[id].done;
    entry.updatedAt=new Date().toISOString();
    dbPut(entry).then(function(){
      pushToFirebase(entry);
      render();
      markCalNeedsRefresh();
    });
  });
}

/* Task add/edit/delete via single modal — idx=null means adding a new task,
   number means editing that task. Blank text on edit deletes the task. */
var _editingTaskIdx=null;
function openTaskEdit(idx){
  _editingTaskIdx=(typeof idx==="number")?idx:null;
  var title=document.getElementById("taskModalTitle");
  var okBtn=document.getElementById("okBtn");
  var inp=document.getElementById("taskInput");
  if(_editingTaskIdx===null){
    title.textContent="タスクを追加";
    okBtn.textContent="追加";
    inp.value="";
    document.getElementById("modal").classList.add("on");
    setTimeout(function(){inp.focus()},80);
  }else{
    title.textContent="タスクを編集";
    okBtn.textContent="保存";
    ensureEntry().then(function(entry){
      var t=((entry.tasks||[])[_editingTaskIdx])||{};
      inp.value=t.text||"";
      document.getElementById("modal").classList.add("on");
      setTimeout(function(){inp.focus()},80);
    });
  }
}
function saveTaskEdit(){
  var v=document.getElementById("taskInput").value;
  v=v?v.trim():"";
  var idx=_editingTaskIdx;
  document.getElementById("modal").classList.remove("on");
  _editingTaskIdx=null;
  ensureEntry().then(function(entry){
    if(!entry.tasks)entry.tasks=[];
    if(idx===null){
      if(!v)return;
      entry.tasks.push({done:false,text:v,drawing:null});
    }else{
      if(!entry.tasks[idx])return;
      if(!v){
        /* Blank text — delete this task entirely */
        entry.tasks.splice(idx,1);
      }else{
        entry.tasks[idx].text=v;
      }
    }
    entry.updatedAt=new Date().toISOString();
    dbPut(entry).then(function(){
      pushToFirebase(entry);
      render();
      markCalNeedsRefresh();
      toast(idx===null?"タスクを追加しました":(v?"タスクを更新しました":"タスクを削除しました"));
    });
  });
}

/* Training detail editor — handles text memo + photo/video media list.
   Media items live in a working array (_editingTrMedia) so the user can
   add/remove and cancel without committing. Save writes the working array
   to entry.training[id].media which then syncs to Firebase and to re:date. */
var _editingTrId=null;
var _editingTrMedia=[];
/* Track Storage paths the user removed in this modal session; only
   actually delete from Storage when they tap 保存 (so Cancel stays clean). */
var _editingTrMediaToDelete=[];

function openTrEdit(id,label){
  _editingTrId=id;
  ensureEntry().then(function(entry){
    var t=((entry.training||{})[id])||{};
    document.getElementById("trModalTitle").textContent=(label||"トレーニング")+"のメモ";
    document.getElementById("trInput").value=t.text||"";
    var arr=(t.media||[]).slice();
    /* Clear any leftover session flag from a prior modal — items from
       the saved entry should be treated as "pre-existing". */
    for(var i=0;i<arr.length;i++){delete arr[i]._session}
    _editingTrMedia=arr;
    _editingTrMediaToDelete=[];
    renderTrMediaEdit();
    document.getElementById("trModal").classList.add("on");
    setTimeout(function(){document.getElementById("trInput").focus()},80);
  });
}

function renderTrMediaEdit(){
  var list=document.getElementById("trMediaList");
  var h="";
  for(var i=0;i<_editingTrMedia.length;i++){
    var m=_editingTrMedia[i];
    var src=m.url||m.data||"";
    h+='<div class="tr-media-item" data-mi="'+i+'">';
    if(m.type==="image"){
      h+='<img src="'+src+'">';
    }else{
      h+='<video src="'+src+'" preload="metadata"></video>';
      h+='<div class="play-icon">▶</div>';
    }
    h+='<button class="del" data-del="'+i+'">×</button>';
    h+='</div>';
  }
  list.innerHTML=h;
  var dels=list.querySelectorAll(".del");
  for(var d=0;d<dels.length;d++){
    dels[d].addEventListener("click",function(e){
      e.stopPropagation();
      var i=parseInt(this.getAttribute("data-del"));
      var m=_editingTrMedia[i];
      if(m){
        if(m._session){
          /* Newly uploaded in this session — delete from Storage immediately */
          if(m.path&&_fbStorage){try{_fbStorage.ref().child(m.path).delete().catch(function(){})}catch(e){}}
        }else if(m.path){
          /* Pre-existing — defer Storage deletion until user taps Save */
          _editingTrMediaToDelete.push(m.path);
        }
      }
      _editingTrMedia.splice(i,1);
      renderTrMediaEdit();
    });
  }
  var items=list.querySelectorAll(".tr-media-item");
  for(var ii=0;ii<items.length;ii++){
    items[ii].addEventListener("click",function(){
      var i=parseInt(this.getAttribute("data-mi"));
      openMediaViewer(_editingTrMedia[i]);
    });
  }
}

function saveTrEdit(){
  var id=_editingTrId;
  document.getElementById("trModal").classList.remove("on");
  if(!id){_editingTrId=null;_editingTrMedia=[];_editingTrMediaToDelete=[];return}
  var v=document.getElementById("trInput").value;
  /* Strip the _session marker before saving — it's only useful within the modal */
  var media=_editingTrMedia.map(function(m){
    var c={};for(var k in m){if(k!=="_session"&&k!=="data")c[k]=m[k]}
    /* Drop legacy inline data once a Storage URL is present so the entry
       stays small for Realtime DB sync. */
    if(!c.url&&m.data)c.data=m.data;
    return c;
  });
  var toDel=_editingTrMediaToDelete.slice();
  _editingTrId=null;_editingTrMedia=[];_editingTrMediaToDelete=[];
  ensureEntry().then(function(entry){
    if(!entry.training)entry.training={};
    if(!entry.training[id])entry.training[id]={};
    if(v&&v.trim()){
      entry.training[id].text=v.trim();
    }else{
      delete entry.training[id].text;
    }
    if(media.length>0){
      entry.training[id].media=media;
    }else{
      delete entry.training[id].media;
    }
    entry.updatedAt=new Date().toISOString();
    dbPut(entry).then(function(){
      pushToFirebase(entry);
      /* Now safe to permanently remove deleted items from Storage */
      if(_fbStorage){
        for(var di=0;di<toDel.length;di++){
          try{_fbStorage.ref().child(toDel[di]).delete().catch(function(){})}catch(e){}
        }
      }
      render();
      markCalNeedsRefresh();
      toast("保存しました");
    });
  });
}

/* Photos compressed to max 1920px / JPEG 85% then stored inline as a
   data URL in the entry. Videos up to 30MB raw. No Firebase Storage —
   keeps usage on the free Realtime Database tier. */
function compressImage(file,maxSize,quality){
  return new Promise(function(resolve){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var w=img.naturalWidth,h=img.naturalHeight;
        if(w>maxSize||h>maxSize){
          var r=Math.min(maxSize/w,maxSize/h);
          w=Math.round(w*r);h=Math.round(h*r);
        }
        var cv=document.createElement("canvas");
        cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg",quality));
      };
      img.onerror=function(){resolve(null)};
      img.src=e.target.result;
    };
    reader.onerror=function(){resolve(null)};
    reader.readAsDataURL(file);
  });
}
function readFileAsDataURL(file){
  return new Promise(function(resolve){
    var reader=new FileReader();
    reader.onload=function(e){resolve(e.target.result)};
    reader.onerror=function(){resolve(null)};
    reader.readAsDataURL(file);
  });
}

function openMediaViewer(m){
  var src=m&&(m.url||m.data);
  if(!src)return;
  var ov=document.createElement("div");
  ov.className="media-viewer";
  if(m.type==="image"){
    var img=document.createElement("img");
    img.src=src;
    ov.appendChild(img);
  }else{
    var vid=document.createElement("video");
    vid.src=src;
    vid.controls=true;
    vid.autoplay=true;
    vid.playsInline=true;
    ov.appendChild(vid);
  }
  var x=document.createElement("button");
  x.className="close-mv";x.textContent="×";
  ov.appendChild(x);
  function close(){if(ov.parentNode)ov.parentNode.removeChild(ov)}
  x.addEventListener("click",close);
  ov.addEventListener("click",function(e){
    if(e.target===ov)close();
  });
  document.body.appendChild(ov);
}

document.getElementById("prev").addEventListener("click",function(){navDay(-1)});
document.getElementById("next").addEventListener("click",function(){navDay(1)});
document.getElementById("ddt").addEventListener("click",function(){
  var c=document.getElementById("cal");

document.getElementById("cnext").addEventListener("click",function(){

document.getElementById("addTask").addEventListener("click",function(){
  openTaskEdit(null);
});
document.getElementById("cancelBtn").addEventListener("click",function(){
  document.getElementById("modal").classList.remove("on");
  _editingTaskIdx=null;
});
document.getElementById("okBtn").addEventListener("click",saveTaskEdit);
document.getElementById("modal").addEventListener("click",function(e){
  if(e.target===this)this.classList.remove("on");
});

function cancelTrEdit(){
  document.getElementById("trModal").classList.remove("on");
  /* Clean up files uploaded during this modal session — user cancelled */
  if(_fbStorage){
    for(var i=0;i<_editingTrMedia.length;i++){
      var m=_editingTrMedia[i];
      if(m._session&&m.path){try{_fbStorage.ref().child(m.path).delete().catch(function(){})}catch(e){}}
    }
  }
  _editingTrId=null;_editingTrMedia=[];_editingTrMediaToDelete=[];
}
document.getElementById("trCancel").addEventListener("click",cancelTrEdit);
document.getElementById("trOk").addEventListener("click",saveTrEdit);
document.getElementById("trModal").addEventListener("click",function(e){
  if(e.target===this)cancelTrEdit();
});
document.getElementById("trMediaInput").addEventListener("change",function(e){
  var files=e.target.files;
  if(!files||!files.length){this.value="";return}
  var jobs=[];
  for(var i=0;i<files.length;i++){
    (function(f){
      var uid="m_"+Date.now()+"_"+Math.random().toString(36).substring(2,8);
      if(f.type&&f.type.indexOf("image/")===0){
        jobs.push(compressImage(f,1920,0.85).then(function(d){
          if(d)return{type:"image",data:d,id:uid,addedAt:new Date().toISOString()};
        }));
      }else if(f.type&&f.type.indexOf("video/")===0){
        if(f.size>30*1024*1024){
          toast("動画が大きすぎます ("+Math.round(f.size/1024/1024)+"MB)。30MB以下にしてください");
          return;
        }
        jobs.push(readFileAsDataURL(f).then(function(d){
          if(d)return{type:"video",data:d,id:uid,addedAt:new Date().toISOString()};
        }));
      }
    })(files[i]);
  }
  Promise.all(jobs).then(function(items){
    for(var k=0;k<items.length;k++){if(items[k])_editingTrMedia.push(items[k])}
    renderTrMediaEdit();
  });
  this.value="";
});

document.getElementById("syncSave").addEventListener("click",function(){
  var v=document.getElementById("syncUrlInput").value.trim();
  if(!v){toast("URLを入力してください");return}
  try{localStorage.setItem("rn_sync_url",v)}catch(e){}
  SYNC_URL=v;
  document.getElementById("setup").classList.remove("on");
  initFirebase();
  toast("同期URLを設定しました");
});

(function(){
  var sx=0,sy=0,active=false;
  document.body.addEventListener("touchstart",function(e){
    if(e.touches.length!==1)return;
    if(document.getElementById("modal").classList.contains("on"))return;
    if(document.getElementById("trModal").classList.contains("on"))return;
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
    active=true;
  },{passive:true});
  document.body.addEventListener("touchend",function(e){
    if(!active)return;
    active=false;
    var ct=e.changedTouches[0];
    if(!ct)return;
    var dx=ct.clientX-sx,dy=ct.clientY-sy;
    if(Math.abs(dx)<60||Math.abs(dy)>40)return;
    var t=e.target;
    while(t&&t!==document.body){
      if(t.tagName==="CANVAS"||t.tagName==="BUTTON"||t.tagName==="TEXTAREA"||t.tagName==="INPUT"||(t.classList&&(t.classList.contains("tk-c")||t.classList.contains("dc")||t.classList.contains("cal"))))return;
      t=t.parentElement;
    }
    navDay(dx<0?1:-1);
  },{passive:true});
})();

updateDateDisplay();
render();
markCalNeedsRefresh();
initFirebase();
</script>
